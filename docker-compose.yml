services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: focusbot
      POSTGRES_USER: focusbot
      POSTGRES_PASSWORD: focusbot_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/FocusBot.WebAPI/Dockerfile
    ports:
      - "5251:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=focusbot;Username=focusbot;Password=focusbot_dev"
      Supabase__Url: "https://your-project.supabase.co"
      Supabase__JwtSecret: "your-supabase-jwt-secret-at-least-32-chars-long!!"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
