<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Foqus Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 24px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow:
        0 18px 60px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.1);
    }
    h1 {
      font-size: 1.25rem;
      margin: 0 0 8px;
    }
    p {
      margin: 4px 0;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .status {
      margin-top: 12px;
      font-size: 0.9rem;
      color: #9ca3af;
    }
    .status.error {
      color: #fca5a5;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.15);
      color: #bae6fd;
      font-size: 0.75rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Completing Foqus sign-in</h1>
    <p>This window can be closed once sign-in is finished.</p>
    <p id="status" class="status">Validating your login link...</p>
  </main>
  <script>
    (async () => {
      const statusEl = document.getElementById("status");

      const searchParams = new URLSearchParams(window.location.search);
      const source = searchParams.get("source");

      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const accessToken = params.get("access_token");

      if (!accessToken) {
        statusEl.textContent = "No access token was found in this link. Please request a new magic link from Foqus.";
        statusEl.classList.add("error");
        return;
      }

      // Desktop app deep link: immediately redirect to foqus:// so the WinUI app can
      // handle the Supabase callback via its protocol handler.
      if (source === "desktop") {
        const fullHash = window.location.hash || "";
        window.location.href = "foqus://auth-callback" + fullHash;
        return;
      }

      const refreshToken = params.get("refresh_token") || "";

      try {
        const response = await fetch("/auth/me", {
          headers: {
            Authorization: `Bearer ${accessToken}`
          }
        });

        if (!response.ok) {
          const text = await response.text();
          statusEl.textContent = `Sign-in failed: ${response.status} ${text}`;
          statusEl.classList.add("error");
          return;
        }

        const me = await response.json();

        // Relay tokens to the Foqus content script so the extension
        // can store them in chrome.storage.local.
        window.postMessage({
          type: "FOCUSBOT_AUTH_CALLBACK",
          accessToken,
          refreshToken,
          email: me.email
        }, "*");

        statusEl.textContent = `Signed in as ${me.email}. You can now close this tab and return to Foqus.`;
      } catch (error) {
        statusEl.textContent = "Network error while completing sign-in. Please verify the API is running and try again.";
        statusEl.classList.add("error");
      }
    })();
  </script>
</body>
</html>
