name: CI/CD

on:
  push:
    branches: [main, webapi]
  pull_request:
    branches: [main, webapi]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore src/FocusBot.WebAPI/FocusBot.WebAPI.csproj
      - name: Build
        run: dotnet build src/FocusBot.WebAPI/FocusBot.WebAPI.csproj --no-restore
      - name: Unit Tests
        run: dotnet test tests/FocusBot.WebAPI.Tests/FocusBot.WebAPI.Tests.csproj --no-restore
      - name: Integration Tests
        run: dotnet test tests/FocusBot.WebAPI.IntegrationTests/FocusBot.WebAPI.IntegrationTests.csproj --no-restore

  terraform_infra:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      swa_api_key: ${{ steps.swa_token.outputs.swa_api_key }}
      web_app_api_key: ${{ steps.swa_token.outputs.web_app_api_key }}
      acr_login_server: ${{ steps.swa_token.outputs.acr_login_server }}
      acr_name: ${{ steps.swa_token.outputs.acr_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend-config=backend.prod.conf
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_jwt_secret: ${{ secrets.SUPABASE_JWT_SECRET }}
          TF_VAR_managed_openai_key: ${{ secrets.MANAGED_OPENAI_KEY }}
          TF_VAR_paddle_webhook_secret: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          TF_VAR_mailerlite_api_key: ${{ secrets.MAILERLITE_API_KEY }}
          TF_VAR_mailerlite_waitlist_group_id: ${{ vars.MAILERLITE_WAITLIST_GROUP_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

      - name: Capture SWA API token
        working-directory: infra/terraform
        id: swa_token
        run: |
          echo "swa_api_key=$(terraform output -raw static_web_app_api_key)" >> $GITHUB_OUTPUT
          echo "web_app_api_key=$(terraform output -raw web_app_api_key)" >> $GITHUB_OUTPUT
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "acr_name=$(terraform output -raw acr_name)" >> $GITHUB_OUTPUT

  deploy-backend:
    needs: [terraform_infra, deploy-frontend, deploy-web-app]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ needs.terraform_infra.outputs.acr_name }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ needs.terraform_infra.outputs.acr_login_server }}/focusbot-api:${{ github.sha }} -f src/FocusBot.WebAPI/Dockerfile .
          docker push ${{ needs.terraform_infra.outputs.acr_login_server }}/focusbot-api:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -backend-config=backend.prod.conf
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Apply (update container image)
        working-directory: infra/terraform
        run: terraform apply -auto-approve -var="container_image_tag=${{ github.sha }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_postgresql_admin_password: ${{ secrets.POSTGRESQL_ADMIN_PASSWORD }}
          TF_VAR_supabase_url: ${{ secrets.SUPABASE_URL }}
          TF_VAR_supabase_jwt_secret: ${{ secrets.SUPABASE_JWT_SECRET }}
          TF_VAR_managed_openai_key: ${{ secrets.MANAGED_OPENAI_KEY }}
          TF_VAR_paddle_webhook_secret: ${{ secrets.PADDLE_WEBHOOK_SECRET }}
          TF_VAR_mailerlite_api_key: ${{ secrets.MAILERLITE_API_KEY }}
          TF_VAR_mailerlite_waitlist_group_id: ${{ vars.MAILERLITE_WAITLIST_GROUP_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}

  deploy-frontend:
    needs: terraform_infra
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.terraform_infra.outputs.swa_api_key }}
          action: "upload"
          app_location: "./src/foqus-website"
          api_location: ""
          output_location: "dist"

  deploy-web-app:
    needs: terraform_infra
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './src/foqus-web-app/package-lock.json'

      - name: Install dependencies
        working-directory: ./src/foqus-web-app
        run: npm ci

      - name: Build web app
        working-directory: ./src/foqus-web-app
        run: npm run build:prod

      - name: Deploy to Azure Static Web App
        id: deploywebapp
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ needs.terraform_infra.outputs.web_app_api_key }}
          action: "upload"
          app_location: "./src/foqus-web-app/dist"
          api_location: ""
          skip_app_build: true
